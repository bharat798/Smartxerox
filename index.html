<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Xerox | Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background Decoration -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-1/2 -right-1/4 w-[1000px] h-[1000px] rounded-full bg-blue-50/50 blur-3xl"></div>
        <div class="absolute -bottom-1/2 -left-1/4 w-[800px] h-[800px] rounded-full bg-slate-100/50 blur-3xl"></div>
    </div>

    <div class="w-full max-w-md relative z-10 animate-slide-up">
        
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-600/20">
                <i data-lucide="printer" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Smart<span class="text-blue-600">Xerox</span></h1>
            <p class="text-slate-500 font-medium mt-2">Partner & Admin Portal</p>
        </div>

        <!-- 1. MAIN LOGIN FORM -->
        <div id="login-container" class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Welcome Back</h2>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="email" id="email" required placeholder="admin@smartxerox.app" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-slate-800 font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-slate-800 font-medium">
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2 mt-2">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>

        <!-- 2. CHANGE PASSWORD FORM (Hidden by default) -->
        <div id="change-pwd-container" class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 hidden">
            <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="shield-alert" class="w-6 h-6 text-amber-600"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Security Update Required</h2>
            <p class="text-sm text-slate-500 mb-6">This is your first login. Please set a new password to secure your account.</p>
            
            <form id="change-pwd-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">New Password</label>
                    <input type="password" id="new-password" required placeholder="Minimum 6 characters" minlength="6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-slate-800 font-medium">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Confirm New Password</label>
                    <input type="password" id="confirm-password" required placeholder="Re-enter password" minlength="6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-slate-800 font-medium">
                </div>

                <button type="submit" id="btn-update-pwd" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mt-2">
                    <span>Set Password & Continue</span>
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                </button>
            </form>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-xl text-sm font-medium transition-all duration-300 opacity-0 pointer-events-none -translate-y-4">
        <!-- Content injected by JS -->
    </div>

    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        import { auth, db } from './js/firebase-init.js';
        import { signInWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // UI Elements
        const loginContainer = document.getElementById('login-container');
        const changePwdContainer = document.getElementById('change-pwd-container');
        const loginForm = document.getElementById('login-form');
        const changePwdForm = document.getElementById('change-pwd-form');
        const btnLogin = document.getElementById('btn-login');
        const btnUpdatePwd = document.getElementById('btn-update-pwd');

        let loggedInUserId = null;

        // 1. LOGIN LOGIC
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Loading State
            const originalBtnText = btnLogin.innerHTML;
            btnLogin.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Checking...`;
            btnLogin.disabled = true;
            lucide.createIcons();

            try {
                // Firebase Login Call
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                loggedInUserId = user.uid;

                // 🟢 MASTER ADMIN BYPASS LOGIC 🟢
                // Agar email smartxerox@gmail.com hai, toh seedha admin panel pe bhej do!
                if (email === 'smartxerox@gmail.com' || email === 'admin@smartxerox.app') {
                    showToast('Welcome Master Admin!', 'success');
                    setTimeout(() => window.location.href = 'admin.html', 1000);
                    return; // Yahan se function ruk jayega
                }

                // Agar Admin nahi hai, toh Check Role in Firestore Database
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();

                    if (userData.role === 'admin') {
                        showToast('Welcome Admin!', 'success');
                        setTimeout(() => window.location.href = 'admin.html', 1000);
                    } 
                    else if (userData.role === 'shop') {
                        if (userData.isFirstLogin === true) {
                            // Show Change Password Form
                            loginContainer.classList.add('hidden');
                            changePwdContainer.classList.remove('hidden');
                            showToast('Security Update Required', 'info');
                        } else {
                            showToast('Login Successful!', 'success');
                            setTimeout(() => window.location.href = 'shop.html', 1000);
                        }
                    }
                } else {
                    // Agar user doc missing hai (Error handling)
                    showToast('Account setup incomplete. Contact Admin.', 'error');
                }

            } catch (error) {
                console.error("Login Error:", error);
                let errorMsg = "Login failed. Please try again.";
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg = "Invalid Email or Password!";
                }
                showToast(errorMsg, 'error');
            } finally {
                btnLogin.innerHTML = originalBtnText;
                btnLogin.disabled = false;
                lucide.createIcons();
            }
        });

        // 2. CHANGE PASSWORD LOGIC
        changePwdForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;

            if (newPwd !== confirmPwd) {
                showToast('Passwords do not match!', 'error');
                return;
            }

            const originalBtnText = btnUpdatePwd.innerHTML;
            btnUpdatePwd.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Updating...`;
            btnUpdatePwd.disabled = true;
            lucide.createIcons();

            try {
                // Update Password in Firebase Auth
                await updatePassword(auth.currentUser, newPwd);

                // Update 'isFirstLogin' flag in Firestore
                const userDocRef = doc(db, "users", loggedInUserId);
                await updateDoc(userDocRef, { isFirstLogin: false });

                showToast('Password Updated! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'shop.html', 1500);

            } catch (error) {
                console.error("Update Password Error:", error);
                showToast("Password update failed. Please login again.", 'error');
                btnUpdatePwd.innerHTML = originalBtnText;
                btnUpdatePwd.disabled = false;
                lucide.createIcons();
            }
        });

        // 3. TOAST NOTIFICATION UTILITY
        let toastTimeout;
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            
            let iconHtml = '';
            if(type === 'error') {
                iconHtml = '<i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>';
            } else if(type === 'success') {
                iconHtml = '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>';
            } else {
                iconHtml = '<i data-lucide="info" class="w-5 h-5 text-blue-400"></i>';
            }
            
            t.innerHTML = `${iconHtml}<span id="toast-msg" class="ml-1">${msg}</span>`;
            lucide.createIcons();

            t.classList.remove('opacity-0', '-translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', '-translate-y-4');
            }, 3000);
        }

        // Initialize icons on load
        lucide.createIcons();
    </script>
</body>
</html>
